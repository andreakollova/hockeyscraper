services:
  - type: cron
    name: hockey-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 9,17 * * *"
    startCommand: python run_all.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
